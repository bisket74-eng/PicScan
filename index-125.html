<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#5e493a" />
  <title>PicScan</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="PicScan" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <style>
    :root {
      --ink: #302820;
      --muted: #74685e;
      --paper: rgba(255,255,255,.93);
      --brown: #6f5745;
      --brown-dark: #4d3a2d;
      --sage: #5e825f;
      --sage-light: #e9f1e6;
      --gold: #e0b65f;
      --red: #b95757;
      --line: #daccc0;
      --shadow: 0 10px 28px rgba(65,46,33,.15);
      --radius: 20px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 0%, rgba(224,182,95,.24), transparent 28%),
        radial-gradient(circle at 100% 15%, rgba(126,164,123,.25), transparent 30%),
        linear-gradient(155deg, #f6ecdf, #edf3e8 58%, #f7eee5);
    }

    body { padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
    button, select, input { font: inherit; }
    button { border: 0; cursor: pointer; }
    button:disabled { opacity: .48; cursor: not-allowed; }

    .app {
      width: min(900px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding-bottom: 30px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      color: white;
      background: rgba(77,58,45,.96);
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 18px rgba(47,34,24,.24);
    }

    h1 { margin: 0; font-size: 1.55rem; line-height: 1; letter-spacing: .01em; }
    header p { margin: 4px 0 0; color: #eadfd6; font-size: .77rem; }

    .header-count {
      flex: 0 0 auto;
      min-width: 62px;
      padding: 8px 10px;
      border-radius: 999px;
      color: var(--brown-dark);
      background: #f4dca7;
      text-align: center;
      font-size: .8rem;
      font-weight: 850;
    }

    main { padding: 15px; }

    .card {
      margin-bottom: 15px;
      padding: 14px;
      border: 1px solid rgba(111,87,69,.11);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .name-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 10px;
      margin-bottom: 12px;
    }

    .field-label {
      display: grid;
      gap: 6px;
      color: var(--brown-dark);
      font-size: .8rem;
      font-weight: 850;
    }

    select, .scan-name {
      width: 100%;
      min-height: 44px;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 13px;
      color: var(--ink);
      background: white;
      outline: none;
    }

    select:focus, .scan-name:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 3px rgba(94,130,95,.13);
    }

    .next-name {
      padding: 9px 10px;
      border-radius: 13px;
      color: var(--sage);
      background: var(--sage-light);
      font-size: .74rem;
      font-weight: 850;
      white-space: nowrap;
    }

    .camera-shell {
      position: relative;
      width: 100%;
      min-height: 280px;
      overflow: hidden;
      border-radius: 18px;
      background: #211d1a;
      aspect-ratio: 3 / 4;
    }

    video, #previewCanvas {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #211d1a;
    }

    #previewCanvas { display: none; }

    .guide {
      position: absolute;
      inset: 7%;
      pointer-events: none;
      border: 2px dashed rgba(255,255,255,.75);
      border-radius: 14px;
      box-shadow: 0 0 0 999px rgba(0,0,0,.11);
    }

    .guide::after {
      content: "Keep a little space between photos";
      position: absolute;
      left: 50%;
      bottom: 9px;
      width: max-content;
      max-width: 92%;
      transform: translateX(-50%);
      padding: 6px 9px;
      border-radius: 999px;
      color: white;
      background: rgba(0,0,0,.62);
      font-size: .7rem;
      text-align: center;
    }

    .camera-shell.reviewing .guide { display: none; }

    .scan-beam {
      position: absolute;
      left: 0;
      right: 0;
      top: -14%;
      height: 14%;
      display: none;
      pointer-events: none;
      background: linear-gradient(to bottom, transparent, rgba(255,232,153,.64), transparent);
      filter: drop-shadow(0 0 8px rgba(255,220,113,.75));
    }

    .camera-shell.scanning .scan-beam {
      display: block;
      animation: scanDown .52s linear infinite;
    }

    @keyframes scanDown { to { transform: translateY(820%); } }

    .scan-progress {
      position: absolute;
      left: 50%;
      bottom: 14px;
      display: none;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 999px;
      color: white;
      background: rgba(48,40,32,.9);
      font-size: .8rem;
      font-weight: 850;
      white-space: nowrap;
    }

    .camera-shell.scanning .scan-progress { display: block; }

    .status {
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 10px 0 0;
      padding: 8px 10px;
      border-radius: 12px;
      color: var(--muted);
      background: #f5eee7;
      text-align: center;
      font-size: .79rem;
      font-weight: 750;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 4px rgba(224,182,95,.17);
    }

    .status.ready .status-dot { background: var(--sage); box-shadow: 0 0 0 4px rgba(94,130,95,.15); }
    .status.error .status-dot { background: var(--red); box-shadow: 0 0 0 4px rgba(185,87,87,.14); }

    .main-action {
      width: 100%;
      min-height: 58px;
      margin-top: 12px;
      padding: 13px 15px;
      border-radius: 16px;
      color: white;
      background: var(--brown);
      box-shadow: 0 7px 16px rgba(79,58,45,.22);
      font-size: 1.06rem;
      font-weight: 900;
    }

    .main-action.camera-live { background: var(--sage); }

    .secondary-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 9px;
    }

    .file-button, .small-button {
      position: relative;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 9px 12px;
      border-radius: 13px;
      color: var(--brown-dark);
      background: #f1e6dc;
      font-size: .82rem;
      font-weight: 850;
    }

    .file-button input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    .review-actions {
      display: none;
      grid-template-columns: 1.35fr 1fr;
      gap: 9px;
      margin-top: 12px;
    }

    .review-actions.visible { display: grid; }

    .confirm-button, .retake-button, .whole-button {
      min-height: 52px;
      padding: 11px 12px;
      border-radius: 15px;
      font-weight: 900;
    }

    .confirm-button { color: white; background: var(--sage); }
    .retake-button { color: var(--brown-dark); background: #f1e6dc; }
    .whole-button { display: none; width: 100%; margin-top: 9px; color: #5b421d; background: #f2d18e; }
    .whole-button.visible { display: block; }

    details {
      margin-top: 10px;
      color: var(--muted);
      font-size: .79rem;
    }

    summary { cursor: pointer; font-weight: 800; }

    .sensitivity-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      margin-top: 9px;
    }

    input[type="range"] { width: 100%; accent-color: var(--sage); }

    .range-value {
      min-width: 30px;
      padding: 5px 7px;
      border-radius: 999px;
      color: var(--sage);
      background: var(--sage-light);
      text-align: center;
      font-weight: 850;
    }

    .results-section { display: none; }
    .results-section.visible { display: block; }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 11px;
    }

    .section-head h2 { margin: 0; font-size: 1.05rem; }
    .section-head p { margin: 4px 0 0; color: var(--muted); font-size: .78rem; }

    .scans {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 11px;
    }

    .scan-card {
      overflow: hidden;
      border: 1px solid rgba(111,87,69,.14);
      border-radius: 16px;
      background: white;
      box-shadow: 0 6px 17px rgba(63,46,34,.10);
    }

    .scan-card.new {
      animation: dropIn .34s cubic-bezier(.2,.85,.3,1.2);
    }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-20px) scale(.92); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .scan-image-wrap {
      position: relative;
      min-height: 132px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        linear-gradient(45deg, #eee 25%, transparent 25%),
        linear-gradient(-45deg, #eee 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #eee 75%),
        linear-gradient(-45deg, transparent 75%, #eee 75%);
      background-size: 18px 18px;
      background-position: 0 0, 0 9px, 9px -9px, -9px 0;
    }

    .scan-image-wrap img {
      width: 100%;
      max-height: 250px;
      display: block;
      object-fit: contain;
      background: #222;
    }

    .scan-number {
      position: absolute;
      top: 7px;
      left: 7px;
      min-width: 27px;
      padding: 5px 7px;
      border-radius: 999px;
      color: white;
      background: rgba(48,40,32,.84);
      text-align: center;
      font-size: .72rem;
      font-weight: 850;
    }

    .scan-info { padding: 9px; }
    .scan-name { min-height: 39px; padding: 7px 8px; border-radius: 10px; font-size: .76rem; }

    .scan-tools {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-top: 7px;
    }

    .scan-tools button {
      min-height: 36px;
      padding: 6px 4px;
      border-radius: 9px;
      color: var(--brown-dark);
      background: #f2e8df;
      font-size: .7rem;
      font-weight: 850;
    }

    .scan-tools button:last-child { color: #903939; background: #f8dede; }

    .result-actions {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 9px;
      margin-top: 12px;
    }

    .zip-button, .clear-button {
      min-height: 48px;
      padding: 10px 12px;
      border-radius: 14px;
      font-weight: 900;
    }

    .zip-button { color: #4e391c; background: #efcd85; }
    .clear-button { color: white; background: var(--red); }

    .busy {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(41,33,27,.72);
      backdrop-filter: blur(5px);
    }

    .busy.visible { display: grid; }

    .busy-box {
      width: min(330px, 100%);
      padding: 22px;
      border-radius: 20px;
      background: white;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .spinner {
      width: 44px;
      height: 44px;
      margin: 0 auto 12px;
      border: 5px solid #eadfd3;
      border-top-color: var(--sage);
      border-radius: 50%;
      animation: spin .78s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .busy-box strong { display: block; margin-bottom: 4px; }
    .busy-box span { color: var(--muted); font-size: .82rem; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 150;
      max-width: calc(100% - 28px);
      padding: 11px 14px;
      border-radius: 999px;
      color: white;
      background: rgba(48,40,32,.95);
      box-shadow: 0 7px 24px rgba(0,0,0,.23);
      font-size: .82rem;
      font-weight: 800;
      text-align: center;
      transform: translate(-50%, 120px);
      transition: transform .22s ease;
    }

    .toast.show { transform: translate(-50%, 0); }

    #sourceCanvas { display: none; }

    @media (min-width: 700px) {
      main { padding: 22px; }
      .camera-shell { aspect-ratio: 4 / 3; }
      .secondary-row { grid-template-columns: 1fr 1fr; }
      .scans { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>PicScan</h1>
        <p>Scan several printed photos at once</p>
      </div>
      <div class="header-count" id="headerCount">0 ready</div>
    </header>

    <main>
      <section class="card">
        <div class="name-row">
          <label class="field-label">
            Photo names
            <select id="categorySelect">
              <option value="Family">Family</option>
              <option value="Work">Work</option>
              <option value="Vacation">Vacation</option>
              <option value="Projects">Projects</option>
              <option value="Home">Home</option>
              <option value="Pets">Pets</option>
              <option value="Other">Other</option>
            </select>
          </label>
          <div class="next-name" id="nextName">Next: Family-0001</div>
        </div>

        <div class="camera-shell" id="cameraShell">
          <video id="video" playsinline muted></video>
          <canvas id="previewCanvas"></canvas>
          <div class="guide"></div>
          <div class="scan-beam"></div>
          <div class="scan-progress" id="scanProgress">Scanning 1 of 1</div>
        </div>

        <div class="status" id="status">
          <span class="status-dot"></span>
          <span id="statusText">Loading photo detection…</span>
        </div>

        <button class="main-action" id="mainAction">OPEN CAMERA</button>

        <div class="secondary-row" id="secondaryRow">
          <label class="file-button">
            Use an Existing Picture
            <input id="fileInput" type="file" accept="image/*" />
          </label>
        </div>

        <div class="review-actions" id="reviewActions">
          <button class="confirm-button" id="confirmButton">YES — SCAN THESE</button>
          <button class="retake-button" id="retakeButton">NO — RETAKE</button>
        </div>
        <button class="whole-button" id="wholeButton">KEEP THE WHOLE PICTURE</button>

        <details>
          <summary>Having trouble finding the photo edges?</summary>
          <div class="sensitivity-row">
            <input id="sensitivity" type="range" min="1" max="10" value="6" />
            <span class="range-value" id="sensitivityValue">6</span>
          </div>
        </details>
      </section>

      <section class="card results-section" id="resultsSection">
        <div class="section-head">
          <div>
            <h2>Ready to save</h2>
            <p>Names keep counting even after PicScan is closed.</p>
          </div>
        </div>

        <div class="scans" id="scans"></div>

        <div class="result-actions">
          <button class="zip-button" id="downloadAllButton">DOWNLOAD ZIP</button>
          <button class="clear-button" id="clearButton">CLEAR SCREEN</button>
        </div>
      </section>
    </main>
  </div>

  <canvas id="sourceCanvas"></canvas>

  <div class="busy" id="busy">
    <div class="busy-box">
      <div class="spinner"></div>
      <strong id="busyTitle">Opening camera…</strong>
      <span id="busyText">Please allow camera access.</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    "use strict";

    const COUNTER_KEY = "picscan-category-counters-v1";
    const CATEGORY_KEY = "picscan-selected-category-v1";

    const video = document.getElementById("video");
    const previewCanvas = document.getElementById("previewCanvas");
    const sourceCanvas = document.getElementById("sourceCanvas");
    const cameraShell = document.getElementById("cameraShell");
    const scanProgress = document.getElementById("scanProgress");

    const categorySelect = document.getElementById("categorySelect");
    const nextName = document.getElementById("nextName");
    const headerCount = document.getElementById("headerCount");
    const mainAction = document.getElementById("mainAction");
    const fileInput = document.getElementById("fileInput");
    const secondaryRow = document.getElementById("secondaryRow");
    const reviewActions = document.getElementById("reviewActions");
    const confirmButton = document.getElementById("confirmButton");
    const retakeButton = document.getElementById("retakeButton");
    const wholeButton = document.getElementById("wholeButton");
    const sensitivity = document.getElementById("sensitivity");
    const sensitivityValue = document.getElementById("sensitivityValue");

    const status = document.getElementById("status");
    const statusText = document.getElementById("statusText");
    const resultsSection = document.getElementById("resultsSection");
    const scansContainer = document.getElementById("scans");
    const downloadAllButton = document.getElementById("downloadAllButton");
    const clearButton = document.getElementById("clearButton");

    const busy = document.getElementById("busy");
    const busyTitle = document.getElementById("busyTitle");
    const busyText = document.getElementById("busyText");
    const toastElement = document.getElementById("toast");

    let stream = null;
    let imageCapture = null;
    let openCvReady = false;
    let mode = "closed";
    let pendingCandidates = [];
    let scans = [];
    let newlyAddedId = null;
    let toastTimer = null;

    const counters = loadCounters();
    const savedCategory = localStorage.getItem(CATEGORY_KEY);
    if (savedCategory && Array.from(categorySelect.options).some(option => option.value === savedCategory)) {
      categorySelect.value = savedCategory;
    }

    function loadCounters() {
      try {
        const parsed = JSON.parse(localStorage.getItem(COUNTER_KEY) || "{}");
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch (error) {
        return {};
      }
    }

    function saveCounters() {
      localStorage.setItem(COUNTER_KEY, JSON.stringify(counters));
    }

    function safeName(value) {
      const cleaned = String(value || "Photo")
        .trim()
        .replace(/[^a-zA-Z0-9_-]+/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");
      return cleaned || "Photo";
    }

    function nextNumberFor(category) {
      return Number(counters[category] || 0) + 1;
    }

    function nextFileName(category, useNumber = false) {
      const number = useNumber ? nextNumberFor(category) : nextNumberFor(category);
      return `${safeName(category)}-${String(number).padStart(4, "0")}`;
    }

    function claimNextFileName(category) {
      counters[category] = nextNumberFor(category);
      saveCounters();
      refreshNextName();
      return `${safeName(category)}-${String(counters[category]).padStart(4, "0")}`;
    }

    function refreshNextName() {
      nextName.textContent = `Next: ${nextFileName(categorySelect.value)}`;
    }

    function setStatus(type, message) {
      status.classList.remove("ready", "error");
      if (type) status.classList.add(type);
      statusText.textContent = message;
    }

    function showBusy(title, text) {
      busyTitle.textContent = title;
      busyText.textContent = text;
      busy.classList.add("visible");
    }

    function hideBusy() {
      busy.classList.remove("visible");
    }

    function toast(message) {
      clearTimeout(toastTimer);
      toastElement.textContent = message;
      toastElement.classList.add("show");
      toastTimer = setTimeout(() => toastElement.classList.remove("show"), 2300);
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function setMode(nextMode) {
      mode = nextMode;
      const reviewing = mode === "review";
      const scanning = mode === "scanning";
      const cameraLive = mode === "camera";

      cameraShell.classList.toggle("reviewing", reviewing || scanning);
      cameraShell.classList.toggle("scanning", scanning);
      reviewActions.classList.toggle("visible", reviewing && pendingCandidates.length > 0);
      wholeButton.classList.toggle("visible", reviewing && pendingCandidates.length === 0);
      secondaryRow.style.display = reviewing || scanning ? "none" : "grid";
      mainAction.style.display = reviewing || scanning ? "none" : "block";
      mainAction.classList.toggle("camera-live", cameraLive);

      if (mode === "closed") mainAction.textContent = "OPEN CAMERA";
      if (mode === "camera") mainAction.textContent = scans.length ? "TAKE NEXT PICTURE" : "TAKE PICTURE";
    }

    function updateResults() {
      headerCount.textContent = `${scans.length} ready`;
      resultsSection.classList.toggle("visible", scans.length > 0);
      renderScans();
    }

    function renderScans() {
      scansContainer.innerHTML = "";
      scans.forEach((scan, index) => {
        const card = document.createElement("article");
        card.className = "scan-card" + (scan.id === newlyAddedId ? " new" : "");

        const imageWrap = document.createElement("div");
        imageWrap.className = "scan-image-wrap";

        const image = document.createElement("img");
        image.src = scan.url;
        image.alt = scan.name;

        const number = document.createElement("span");
        number.className = "scan-number";
        number.textContent = String(index + 1);

        imageWrap.append(image, number);

        const info = document.createElement("div");
        info.className = "scan-info";

        const nameInput = document.createElement("input");
        nameInput.className = "scan-name";
        nameInput.type = "text";
        nameInput.value = scan.name;
        nameInput.setAttribute("aria-label", `Name for photo ${index + 1}`);
        nameInput.addEventListener("change", () => {
          scan.name = safeName(nameInput.value);
          nameInput.value = scan.name;
        });

        const tools = document.createElement("div");
        tools.className = "scan-tools";

        const rotateButton = document.createElement("button");
        rotateButton.textContent = "Rotate";
        rotateButton.addEventListener("click", () => rotateScan(scan.id));

        const saveButton = document.createElement("button");
        saveButton.textContent = "Save";
        saveButton.addEventListener("click", () => downloadScan(scan.id));

        const deleteButton = document.createElement("button");
        deleteButton.textContent = "Delete";
        deleteButton.addEventListener("click", () => removeScan(scan.id));

        tools.append(rotateButton, saveButton, deleteButton);
        info.append(nameInput, tools);
        card.append(imageWrap, info);
        scansContainer.append(card);
      });

      requestAnimationFrame(() => { newlyAddedId = null; });
    }

    async function onOpenCvReady() {
      try {
        if (window.cv instanceof Promise) window.cv = await window.cv;
        if (window.cv && window.cv.Mat) {
          finishOpenCvSetup();
        } else if (window.cv) {
          window.cv.onRuntimeInitialized = finishOpenCvSetup;
        } else {
          throw new Error("OpenCV did not initialize.");
        }
      } catch (error) {
        console.error(error);
        setStatus("error", "Automatic photo splitting could not load.");
      }
    }

    function finishOpenCvSetup() {
      openCvReady = true;
      setStatus("ready", stream ? "Camera ready. Lay out the photos and tap Take Picture." : "Ready. Tap Open Camera.");
    }

    async function mainActionPressed() {
      if (mode === "closed") {
        await openCamera();
      } else if (mode === "camera") {
        await capturePicture();
      }
    }

    async function openCamera() {
      if (!navigator.mediaDevices?.getUserMedia) {
        toast("Camera access requires the HTTPS GitHub page. You can use an existing picture here.");
        return;
      }

      try {
        showBusy("Opening camera…", "Please allow camera access.");
        stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 3840 },
            height: { ideal: 2160 }
          }
        });

        video.srcObject = stream;
        await video.play();
        const track = stream.getVideoTracks()[0];
        imageCapture = "ImageCapture" in window ? new ImageCapture(track) : null;

        previewCanvas.style.display = "none";
        video.style.display = "block";
        setMode("camera");
        setStatus(openCvReady ? "ready" : "", openCvReady ? "Camera ready. Tap Take Picture." : "Camera ready. Photo detection is still loading…");
      } catch (error) {
        console.error(error);
        setStatus("error", "Camera permission was not available.");
        toast("The camera could not open.");
      } finally {
        hideBusy();
      }
    }

    async function capturePicture() {
      if (!stream) return;

      try {
        showBusy("Taking picture…", "Hold the phone still.");
        let blob = null;

        if (imageCapture?.takePhoto) {
          try {
            blob = await imageCapture.takePhoto();
          } catch (error) {
            console.warn("Full-resolution capture failed. Using the video frame.", error);
          }
        }

        if (!blob) {
          const canvas = document.createElement("canvas");
          canvas.width = video.videoWidth || 1920;
          canvas.height = video.videoHeight || 1080;
          canvas.getContext("2d", { alpha: false }).drawImage(video, 0, 0, canvas.width, canvas.height);
          blob = await canvasToBlob(canvas, "image/jpeg", .96);
        }

        await prepareReview(blob);
      } catch (error) {
        console.error(error);
        toast("The picture could not be processed.");
      } finally {
        hideBusy();
      }
    }

    async function prepareReview(blob) {
      await loadSourceBlob(blob);
      pendingCandidates = openCvReady ? detectPhotoCandidates(sourceCanvas) : [];
      drawSourcePreview(pendingCandidates, -1);
      setMode("review");

      if (pendingCandidates.length) {
        confirmButton.textContent = `YES — SCAN ${pendingCandidates.length}`;
        setStatus("ready", `${pendingCandidates.length} photo${pendingCandidates.length === 1 ? "" : "s"} found. Are the green outlines correct?`);
      } else {
        setStatus("error", "No separate photo edges were found. Retake it, raise sensitivity, or keep the whole picture.");
      }
    }

    function retake() {
      pendingCandidates = [];
      previewCanvas.style.display = "none";

      if (stream) {
        video.style.display = "block";
        video.play().catch(() => {});
        setMode("camera");
        setStatus(openCvReady ? "ready" : "", "Camera ready. Tap Take Picture.");
      } else {
        setMode("closed");
        setStatus(openCvReady ? "ready" : "", "Ready. Tap Open Camera or use an existing picture.");
      }
    }

    async function confirmDetectedPhotos() {
      if (!pendingCandidates.length) return;

      setMode("scanning");
      const sourceMat = cv.imread(sourceCanvas);

      try {
        for (let index = 0; index < pendingCandidates.length; index += 1) {
          scanProgress.textContent = `Scanning ${index + 1} of ${pendingCandidates.length}`;
          drawSourcePreview(pendingCandidates, index);
          await delay(180);

          const canvas = warpCandidate(sourceMat, pendingCandidates[index].points);
          await addCanvasAsScan(canvas);
          canvas.width = 1;
          canvas.height = 1;
          updateResults();
          await delay(180);
        }

        toast(`${pendingCandidates.length} photo${pendingCandidates.length === 1 ? "" : "s"} ready to save.`);
      } catch (error) {
        console.error(error);
        toast("One of the photos could not be separated.");
      } finally {
        sourceMat.delete();
        pendingCandidates = [];
        cameraShell.classList.remove("scanning");
        retake();
      }
    }

    async function keepWholePicture() {
      setMode("scanning");
      scanProgress.textContent = "Saving picture";
      try {
        await delay(180);
        await addCanvasAsScan(sourceCanvas);
        updateResults();
        toast("The full picture is ready to save.");
      } finally {
        pendingCandidates = [];
        retake();
      }
    }

    async function handleFile(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        showBusy("Opening picture…", "Finding the printed photos.");
        await prepareReview(file);
      } catch (error) {
        console.error(error);
        toast("That picture could not be opened.");
      } finally {
        hideBusy();
        fileInput.value = "";
      }
    }

    async function loadSourceBlob(blob) {
      const bitmap = await blobToBitmap(blob);
      const maxDimension = 3000;
      const scale = Math.min(1, maxDimension / Math.max(bitmap.width, bitmap.height));
      sourceCanvas.width = Math.max(1, Math.round(bitmap.width * scale));
      sourceCanvas.height = Math.max(1, Math.round(bitmap.height * scale));

      const context = sourceCanvas.getContext("2d", { alpha: false, willReadFrequently: true });
      context.fillStyle = "white";
      context.fillRect(0, 0, sourceCanvas.width, sourceCanvas.height);
      context.drawImage(bitmap, 0, 0, sourceCanvas.width, sourceCanvas.height);
      if (bitmap.close) bitmap.close();
    }

    async function blobToBitmap(blob) {
      if ("createImageBitmap" in window) {
        try {
          return await createImageBitmap(blob, { imageOrientation: "from-image" });
        } catch (error) {
          return await createImageBitmap(blob);
        }
      }

      return await new Promise((resolve, reject) => {
        const url = URL.createObjectURL(blob);
        const image = new Image();
        image.onload = () => {
          URL.revokeObjectURL(url);
          resolve(image);
        };
        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("The image could not be opened."));
        };
        image.src = url;
      });
    }

    function detectPhotoCandidates(canvas) {
      const src = cv.imread(canvas);
      const gray = new cv.Mat();
      const blurred = new cv.Mat();
      const edges = new cv.Mat();
      const closed = new cv.Mat();
      const contours = new cv.MatVector();
      const hierarchy = new cv.Mat();
      const kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(7, 7));

      try {
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
        cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
        cv.Canny(blurred, edges, 45, 145);
        cv.morphologyEx(edges, closed, cv.MORPH_CLOSE, kernel);
        cv.dilate(closed, closed, kernel);
        cv.findContours(closed, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

        const imageArea = src.rows * src.cols;
        const sensitivityValue = Number(sensitivity.value);
        const minAreaRatio = .006 + ((10 - sensitivityValue) * .0044);
        const minArea = imageArea * minAreaRatio;
        const maxArea = imageArea * .94;
        const candidates = [];

        for (let index = 0; index < contours.size(); index += 1) {
          const contour = contours.get(index);
          const area = Math.abs(cv.contourArea(contour));

          if (area < minArea || area > maxArea) {
            contour.delete();
            continue;
          }

          const perimeter = cv.arcLength(contour, true);
          const approx = new cv.Mat();
          cv.approxPolyDP(contour, approx, .025 * perimeter, true);

          if (approx.rows === 4 && cv.isContourConvex(approx)) {
            const points = [];
            for (let row = 0; row < 4; row += 1) {
              points.push({ x: approx.intAt(row, 0), y: approx.intAt(row, 1) });
            }

            const ordered = orderPoints(points);
            const width = Math.max(distance(ordered[0], ordered[1]), distance(ordered[2], ordered[3]));
            const height = Math.max(distance(ordered[0], ordered[3]), distance(ordered[1], ordered[2]));
            const aspect = width / Math.max(1, height);

            if (width > 120 && height > 120 && aspect > .20 && aspect < 5) {
              candidates.push({
                points: ordered,
                rect: boundingRectFromPoints(ordered),
                area
              });
            }
          }

          approx.delete();
          contour.delete();
        }

        return sortCandidates(dedupeCandidates(candidates));
      } finally {
        src.delete();
        gray.delete();
        blurred.delete();
        edges.delete();
        closed.delete();
        contours.delete();
        hierarchy.delete();
        kernel.delete();
      }
    }

    function drawSourcePreview(candidates, activeIndex) {
      const displayLimit = 1400;
      const scale = Math.min(1, displayLimit / Math.max(sourceCanvas.width, sourceCanvas.height));
      previewCanvas.width = Math.max(1, Math.round(sourceCanvas.width * scale));
      previewCanvas.height = Math.max(1, Math.round(sourceCanvas.height * scale));

      const context = previewCanvas.getContext("2d");
      context.drawImage(sourceCanvas, 0, 0, previewCanvas.width, previewCanvas.height);
      context.font = `bold ${Math.max(15, previewCanvas.width / 42)}px system-ui`;

      candidates.forEach((candidate, index) => {
        const points = candidate.points.map(point => ({ x: point.x * scale, y: point.y * scale }));
        const active = index === activeIndex;

        context.beginPath();
        context.moveTo(points[0].x, points[0].y);
        for (let pointIndex = 1; pointIndex < points.length; pointIndex += 1) {
          context.lineTo(points[pointIndex].x, points[pointIndex].y);
        }
        context.closePath();
        context.lineWidth = active ? Math.max(6, previewCanvas.width / 140) : Math.max(3, previewCanvas.width / 230);
        context.strokeStyle = active ? "#ffd76d" : "#71e381";
        context.fillStyle = active ? "rgba(255,215,109,.25)" : "rgba(45,140,63,.16)";
        context.fill();
        context.stroke();

        const labelX = Math.min(...points.map(point => point.x));
        const labelY = Math.min(...points.map(point => point.y));
        context.fillStyle = active ? "rgba(119,85,13,.95)" : "rgba(32,84,40,.92)";
        context.fillRect(labelX, Math.max(0, labelY - 27), 31, 27);
        context.fillStyle = "white";
        context.fillText(String(index + 1), labelX + 8, Math.max(20, labelY - 7));
      });

      video.style.display = "none";
      previewCanvas.style.display = "block";
    }

    function orderPoints(points) {
      const sum = point => point.x + point.y;
      const difference = point => point.y - point.x;
      const topLeft = points.reduce((best, point) => sum(point) < sum(best) ? point : best);
      const bottomRight = points.reduce((best, point) => sum(point) > sum(best) ? point : best);
      const topRight = points.reduce((best, point) => difference(point) < difference(best) ? point : best);
      const bottomLeft = points.reduce((best, point) => difference(point) > difference(best) ? point : best);
      return [topLeft, topRight, bottomRight, bottomLeft];
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function boundingRectFromPoints(points) {
      const xs = points.map(point => point.x);
      const ys = points.map(point => point.y);
      const x = Math.min(...xs);
      const y = Math.min(...ys);
      return { x, y, width: Math.max(...xs) - x, height: Math.max(...ys) - y };
    }

    function intersectionOverUnion(a, b) {
      const x1 = Math.max(a.x, b.x);
      const y1 = Math.max(a.y, b.y);
      const x2 = Math.min(a.x + a.width, b.x + b.width);
      const y2 = Math.min(a.y + a.height, b.y + b.height);
      const intersection = Math.max(0, x2 - x1) * Math.max(0, y2 - y1);
      if (!intersection) return 0;
      const union = (a.width * a.height) + (b.width * b.height) - intersection;
      return intersection / Math.max(1, union);
    }

    function dedupeCandidates(candidates) {
      const sorted = [...candidates].sort((a, b) => b.area - a.area);
      const kept = [];

      sorted.forEach(candidate => {
        const duplicate = kept.some(existing => {
          const overlap = intersectionOverUnion(candidate.rect, existing.rect);
          const centerX = candidate.rect.x + candidate.rect.width / 2;
          const centerY = candidate.rect.y + candidate.rect.height / 2;
          const centerInside =
            centerX >= existing.rect.x && centerX <= existing.rect.x + existing.rect.width &&
            centerY >= existing.rect.y && centerY <= existing.rect.y + existing.rect.height;
          const relativeArea = candidate.area / Math.max(1, existing.area);
          return overlap > .58 || (centerInside && relativeArea > .72);
        });

        if (!duplicate) kept.push(candidate);
      });

      return kept;
    }

    function sortCandidates(candidates) {
      if (candidates.length < 2) return candidates;
      const averageHeight = candidates.reduce((sum, item) => sum + item.rect.height, 0) / candidates.length;
      const rowTolerance = averageHeight * .42;

      return [...candidates].sort((a, b) => {
        const ay = a.rect.y + a.rect.height / 2;
        const by = b.rect.y + b.rect.height / 2;
        if (Math.abs(ay - by) <= rowTolerance) return a.rect.x - b.rect.x;
        return ay - by;
      });
    }

    function warpCandidate(sourceMat, orderedPoints) {
      const [topLeft, topRight, bottomRight, bottomLeft] = orderedPoints;
      const width = Math.max(distance(bottomRight, bottomLeft), distance(topRight, topLeft));
      const height = Math.max(distance(topRight, bottomRight), distance(topLeft, bottomLeft));
      const outputWidth = Math.max(100, Math.round(width));
      const outputHeight = Math.max(100, Math.round(height));

      const sourcePoints = cv.matFromArray(4, 1, cv.CV_32FC2, [
        topLeft.x, topLeft.y,
        topRight.x, topRight.y,
        bottomRight.x, bottomRight.y,
        bottomLeft.x, bottomLeft.y
      ]);

      const destinationPoints = cv.matFromArray(4, 1, cv.CV_32FC2, [
        0, 0,
        outputWidth - 1, 0,
        outputWidth - 1, outputHeight - 1,
        0, outputHeight - 1
      ]);

      const transform = cv.getPerspectiveTransform(sourcePoints, destinationPoints);
      const output = new cv.Mat();

      try {
        cv.warpPerspective(
          sourceMat,
          output,
          transform,
          new cv.Size(outputWidth, outputHeight),
          cv.INTER_CUBIC,
          cv.BORDER_REPLICATE,
          new cv.Scalar()
        );

        const canvas = document.createElement("canvas");
        canvas.width = outputWidth;
        canvas.height = outputHeight;
        cv.imshow(canvas, output);
        return canvas;
      } finally {
        sourcePoints.delete();
        destinationPoints.delete();
        transform.delete();
        output.delete();
      }
    }

    async function addCanvasAsScan(canvas) {
      const blob = await canvasToBlob(canvas, "image/jpeg", .94);
      const name = claimNextFileName(categorySelect.value);
      const scan = {
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
        name,
        blob,
        url: URL.createObjectURL(blob)
      };
      scans.push(scan);
      newlyAddedId = scan.id;
    }

    function canvasToBlob(canvas, type = "image/jpeg", quality = .94) {
      return new Promise((resolve, reject) => {
        canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error("Could not create image.")), type, quality);
      });
    }

    async function rotateScan(id) {
      const scan = scans.find(item => item.id === id);
      if (!scan) return;

      try {
        showBusy("Rotating photo…", "Turning it 90 degrees.");
        const bitmap = await blobToBitmap(scan.blob);
        const canvas = document.createElement("canvas");
        canvas.width = bitmap.height;
        canvas.height = bitmap.width;
        const context = canvas.getContext("2d", { alpha: false });
        context.translate(canvas.width, 0);
        context.rotate(Math.PI / 2);
        context.drawImage(bitmap, 0, 0);
        if (bitmap.close) bitmap.close();

        const blob = await canvasToBlob(canvas, "image/jpeg", .94);
        URL.revokeObjectURL(scan.url);
        scan.blob = blob;
        scan.url = URL.createObjectURL(blob);
        updateResults();
      } catch (error) {
        console.error(error);
        toast("The photo could not be rotated.");
      } finally {
        hideBusy();
      }
    }

    function removeScan(id) {
      const index = scans.findIndex(item => item.id === id);
      if (index < 0) return;
      URL.revokeObjectURL(scans[index].url);
      scans.splice(index, 1);
      updateResults();
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1200);
    }

    function downloadScan(id) {
      const scan = scans.find(item => item.id === id);
      if (!scan) return;
      downloadBlob(scan.blob, `${safeName(scan.name)}.jpg`);
    }

    async function downloadAll() {
      if (!scans.length) return;
      const category = safeName(categorySelect.value);
      const stamp = new Date().toISOString().replace(/[:.]/g, "-");

      if (!window.JSZip) {
        scans.forEach((scan, index) => setTimeout(() => downloadScan(scan.id), index * 220));
        toast("The photos are downloading separately.");
        return;
      }

      try {
        showBusy("Building ZIP…", "Packing the photos together.");
        const zip = new JSZip();
        const usedNames = new Map();

        scans.forEach((scan, index) => {
          let name = safeName(scan.name) || `Photo-${index + 1}`;
          const count = usedNames.get(name) || 0;
          usedNames.set(name, count + 1);
          if (count) name = `${name}-${count + 1}`;
          zip.file(`${name}.jpg`, scan.blob);
        });

        const blob = await zip.generateAsync({
          type: "blob",
          compression: "DEFLATE",
          compressionOptions: { level: 6 }
        });

        downloadBlob(blob, `PicScan-${category}-${stamp}.zip`);
        toast("ZIP ready.");
      } catch (error) {
        console.error(error);
        toast("The ZIP could not be created.");
      } finally {
        hideBusy();
      }
    }

    function clearScreen() {
      if (!scans.length) return;
      if (!window.confirm("Clear the photos from this screen? The numbering will keep going.")) return;
      scans.forEach(scan => URL.revokeObjectURL(scan.url));
      scans = [];
      updateResults();
      toast("Screen cleared. Numbering was kept.");
    }

    function stopCamera() {
      if (stream) stream.getTracks().forEach(track => track.stop());
      stream = null;
      imageCapture = null;
      video.srcObject = null;
    }

    categorySelect.addEventListener("change", () => {
      localStorage.setItem(CATEGORY_KEY, categorySelect.value);
      refreshNextName();
    });

    sensitivity.addEventListener("input", () => {
      sensitivityValue.textContent = sensitivity.value;
    });

    mainAction.addEventListener("click", mainActionPressed);
    fileInput.addEventListener("change", handleFile);
    confirmButton.addEventListener("click", confirmDetectedPhotos);
    retakeButton.addEventListener("click", retake);
    wholeButton.addEventListener("click", keepWholePicture);
    downloadAllButton.addEventListener("click", downloadAll);
    clearButton.addEventListener("click", clearScreen);

    window.addEventListener("beforeunload", () => {
      stopCamera();
      scans.forEach(scan => URL.revokeObjectURL(scan.url));
    });

    refreshNextName();
    setMode("closed");
    updateResults();
  </script>
  <script
    async
    src="https://docs.opencv.org/4.x/opencv.js"
    onload="onOpenCvReady()"
    onerror="setStatus('error', 'Automatic photo splitting could not load. Check the internet connection.')">
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(error => {
          console.warn("PicScan service worker registration failed:", error);
        });
      });
    }
  </script>
</body>
</html>
